epochs: 100

model:
  DeepFont:
    autoencoder:
      load_from_checkpoint:
        model: DeepFontAutoencoder
        path: checkpoints/deepfont/ja/autoencoder/epoch=98_val_loss=0.0118.ckpt
    num_classes: 5

loss:
  torch.nn.CrossEntropyLoss

optimizer:
  torch.optim.SGD:
    lr: 0.01
    momentum: 0.9
    weight_decay: 0.0005

train_loader:
  batch_size: 64
  shuffle: true
  num_workers: 12
  drop_last: false
  pin_memory: true
  dataset:
    BasicDataset:
      loader:
        ComicStyleLoader:
          root: dataset/ja
          train: true

      input_shape: image
      target_shape: font

      transforms:
        - ToGrayscale:
            keys: [image]

        - ScaleToHeight:
            keys: [image]
            target_height: 105

        - Albumentations:
            image_keys: [image]
            transforms:
              - albumentations.GaussNoise:
                  std_range: [0.0118, 0.0157]
                  p: 0.5
              - albumentations.GaussianBlur:
                  blur_limit: [1, 3]
                  p: 0.5
              - albumentations.Affine:
                  rotate: [-3, 3]
                  p: 0.5
              - albumentations.MultiplicativeNoise:
                  multiplier: [0.3, 0.8]
                  p: 0.5

        - VariableAspectRatio:
            keys: [image]
            ratio_range: [0.83, 1.17]

        - ForceAspectRatio:
            keys: [image]
            ratio: 2.5

        - RandomPatchCrop:
            keys: [image]
            patch_size: [105, 105]

        - ToTensor:
            keys: [image]
            scale: True
            dtype: float

        - FontToId:
            keys: [font]
            lang: ja

val_loader:
  batch_size: 1
  shuffle: false
  num_workers: 2
  drop_last: false
  pin_memory: true
  dataset:
    BasicDataset:
      loader:
        ComicStyleLoader:
          root: dataset/ja
          train: false

      input_shape: image
      target_shape: font

      transforms:
        - ToGrayscale:
            keys: [image]

        - ScaleToHeight:
            keys: [image]
            target_height: 105

        - ForceAspectRatio:
            keys: [image]
            ratio: 2.5

        - RandomPatchCrop:
            keys: [image]
            patch_size: [105, 105]
            use_grid_sampling: true

        - ToTensor:
            keys: [image]
            scale: True
            dtype: float

        - FontToId:
            keys: [font]
            lang: ja

callbacks:
  - MetricsCallback
  - ProgressCallback
  - CheckpointCallback:
      dirpath: checkpoints/deepfont/ja/deepfont
      monitor: val_loss
      mode: min
      top_k: 3
